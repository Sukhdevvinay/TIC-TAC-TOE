<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac</title>
    <link rel="icon" href='tic tac toe.jpg'>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            background-color: black;
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }
        
        .game {
            width: min(85vw, 550px);
            margin: 20px auto;
            margin-top: 40px;
            margin-bottom: 50px;
            min-height: 70vh;
            max-height: 70vh;
        }
        
        @media (max-width: 768px) {
            .game {
                width: 95vw;
                margin-top: 20px;
            }
            
            h3 {
                margin-left: 10px;
                margin-right: auto;
                font-size: 30px;
            }
        }
        
        @media (max-width: 480px) {
            .game {
                width: 100vw;
                margin: 10px;
                max-height: 60vh;
            }
            
            .box {
                height: 100px;
                width: 100px;
            }
            
            h3 {
                margin-left: 5px;
                margin-right: auto;
                font-size: 25px;
            }
        }
        
        .container {
            display: flex;
            margin-left: 10px;
            margin-right: 10px;
        }
        
        @media (max-width: 768px) {
            .container {
                margin-left: 5px;
                margin-right: 5px;
            }
        }
        
        .box {
            border: solid white 5px;
            height: 150px;
            width: 150px;
            border-top-color: black;
            min-height: 100px;
            min-width: 100px;
        }
        
        #first,#fourth,#seventh {
            border-right-color: black;
            border-left-color: black;
            cursor: pointer;
        }
        
        #third,#sixth,#ninth {
            border-right-color: black;
            border-left-color: black;
            cursor: pointer;
        }
        
        #seventh,#eight,#ninth {
            border-bottom-color: black;
            cursor: pointer;
        }
        
        #second,#fifth {
            cursor: pointer;
        }
        
        .players {
            font-size: 20px;
            margin-left: 70px;
        }
        
        @media (max-width: 480px) {
            .players {
                font-size: 16px;
                margin-left: 20px;
                margin-top: 20px;
            }
        }
        
        .score {
            margin-left: 132px;
        }
        
        @media (max-width: 480px) {
            .score {
                margin-left: 40px;
                font-size: 20px;
            }
        }
        
        .play,.play2 {
            margin-left: 1px;
            margin-right: auto;
            margin-top: 37px;
        }
        
        @media (max-width: 480px) {
            .play {
                margin-top: 20px;
            }
            
            .play2 {
                margin-top: 10px;
                margin-left: -20px;
                font-size: 20px;
                margin-right: auto;
            }
        }
        
        h3 {
            margin-left: 153px;
            margin-right: auto;
            font-size: 40px;
            color: red;
        }
        
        @keyframes Mahi {
            0% {
                opacity: 1;
            }
            15% {
                opacity: 0;
            }
            30% {
                opacity: 1;
            }
            45% {
                opacity: 0;
            }
            60% {
                opacity: 1;
            }
            75% {
                opacity: 0;
            }
        }
        
        .hello {
            animation-name: Mahi;
            animation-duration: 1s;
        }
        
        #P1,#P2 {
            cursor: pointer;
        }
        
        #tie,#P2,#Tied_score,#Player2_score {
            color : grey;
        }
        
        /* Responsive adjustments for mobile touch targets */
        @media (max-width: 480px) {
            .box {
                border-width: 4px;
            }
            
            .box {
                height: 120px;
                width: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="game">
        <h3>TIC-TAC</h3>
        <div class="container">
            <div class="box" id="first" onclick="draw(this.id)"></div>
            <div class="box" id="second" onclick="draw(this.id)"></div>
            <div class="box" id="third" onclick="draw(this.id)"></div>
        </div>
        <div class="container">
            <div class="box" id="fourth" onclick="draw(this.id)"></div>
            <div class="box" id="fifth" onclick="draw(this.id)"></div>
            <div class="box" id="sixth" onclick="draw(this.id)"></div>
        </div>
        <div class="container">
            <div class="box" id="seventh" onclick="draw(this.id)"></div>
            <div class="box" id="eight" onclick="draw(this.id)"></div>
            <div class="box" id="ninth" onclick="draw(this.id)"></div>
        </div>
        <div class="play">
            <span class="players" id="P1" onclick="Edit1(this.id)">PLAYER(O)</span>
            <span class="players" id="tie">TIE</span>
            <span class="players" id="P2" onclick="Edit2(this.id)">PLAYER(X)</span>
        </div>
        <div class="play2">
            <span class="score" id="Player1_score">0</span>
            <span class="score" id="Tied_score">0</span>
            <span class="score" id="Player2_score">0</span>
        </div>
    </div>
    
    <script src="tictac.js"></script>
</body>
</html>
